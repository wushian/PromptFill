kind: pipeline
type: docker
name: deploy

# 只回應 GitHub Actions 透過 API 觸發，不回應 git push
trigger:
  event:
    - custom

steps:
  - name: deploy
    image: alpine:3.19
    environment:
      SSHPASS:
        from_secret: ssh_password
      GH_PAT:
        from_secret: gh_pat
      GH_OWNER:
        from_secret: gh_owner
    commands:
      - apk add --no-cache openssh-client sshpass
      - '[ -n "$SSHPASS" ]  || { echo "ERROR: Drone secret ssh_password not set"; exit 1; }'
      - '[ -n "$GH_PAT" ]   || { echo "ERROR: Drone secret gh_pat not set";       exit 1; }'
      - '[ -n "$GH_OWNER" ] || { echo "ERROR: Drone secret gh_owner not set";     exit 1; }'
      - mkdir -p /root/.ssh && ssh-keyscan -H 172.17.1.25 >> /root/.ssh/known_hosts
      - sshpass -e ssh root@172.17.1.25 mkdir -p /app/promptfill
      - printf 'GH_PAT=%s\nGH_OWNER=%s\n' "$GH_PAT" "$GH_OWNER" > /tmp/.env
      - sshpass -e scp /tmp/.env root@172.17.1.25:/app/promptfill/.env
      - sshpass -e scp -r infra/ root@172.17.1.25:/app/promptfill/
      - sshpass -e ssh root@172.17.1.25 bash /app/promptfill/infra/deploy.sh
